<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CODERS VERSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; -webkit-tap-highlight-color: transparent; overflow-x: hidden; max-width: 100vw; }

    /* ── SINGLE STATIC BACKGROUND ── */
    #global-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 90% 60% at 70% 100%, #3b0066 0%, transparent 55%),
        radial-gradient(ellipse 70% 70% at 10% 50%, #00204a 0%, transparent 55%),
        radial-gradient(ellipse 80% 50% at 85% 15%, #1a004488 0%, transparent 50%),
        radial-gradient(ellipse 60% 60% at 30% 80%, #00003388 0%, transparent 50%),
        linear-gradient(160deg, #060010 0%, #04000d 40%, #000818 100%);
    }

    #global-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 75% 85%, rgba(120, 40, 200, 0.22) 0%, transparent 45%),
        radial-gradient(circle at 20% 30%, rgba(30, 80, 180, 0.18) 0%, transparent 40%);
      animation: bg-breathe 12s ease-in-out infinite alternate;
    }
    #global-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 60% 20%, rgba(80, 20, 150, 0.14) 0%, transparent 40%),
        radial-gradient(circle at 10% 80%, rgba(20, 60, 140, 0.12) 0%, transparent 38%);
      animation: bg-breathe 18s ease-in-out infinite alternate-reverse;
    }
    @keyframes bg-breathe {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.06); }
    }

    #app {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
      background-color: transparent;
      z-index: 1;
    }

    #grain { position:fixed;inset:0;pointer-events:none;z-index:9999;background-size:200px 200px;background-repeat:repeat;opacity:0.38; }

    /* ── BRAND ── */
    #brand {
      position: absolute;
      top: max(1.5rem, env(safe-area-inset-top, 1.5rem));
      left: 1.5rem;
      z-index: 60;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: clamp(16px, 3.2vw, 26px);
      letter-spacing: 0.02em;
      color: #fff;
    }
    #brand .brand-coders { color: #fff; }
    #brand .brand-verse {
      background: linear-gradient(125deg, #c084fc 0%, #818cf8 50%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @media (min-width:640px) { #brand { left: 3rem; top: 2rem; } }

    /* ── CONTACT BUTTON ── */
    #contact-btn {
      position: absolute;
      top: max(1.5rem, env(safe-area-inset-top, 1.5rem));
      right: 1.5rem;
      z-index: 60;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: clamp(13px, 1.8vw, 16px);
      letter-spacing: 0.06em;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1.4rem;
      border-radius: 100px;
      border: 1.5px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 200ms, border-color 200ms, transform 150ms, box-shadow 200ms;
      cursor: pointer;
    }
    #contact-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(192,132,252,0.18);
    }
    #contact-btn:active { transform: scale(0.96); }
    @media (min-width:640px) { #contact-btn { right: 3rem; top: 2rem; } }

    /* ── HERO TEXT (both mobile & desktop) ── */
    #hero-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: absolute;
      left: 1.5rem;
      right: 1.5rem;
      top: 0;
      bottom: 0;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }
    @media (min-width: 640px) {
      #hero-text {
        left: 3rem;
        right: auto;
        width: 70%;
      }
    }

    .hero-we-make {
      font-family: 'Anton', sans-serif;
      font-size: clamp(32px, 5.25vw, 82px);
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 0;
    }

    .hero-best {
      font-family: 'Anton', sans-serif;
      font-size: clamp(32px, 5.25vw, 82px);
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .hero-websites {
      font-family: 'Anton', sans-serif;
      font-size: clamp(65px, 13.5vw, 195px);
      line-height: 0.92;
      letter-spacing: 0.02em;
      margin-top: 0.05em;
      margin-bottom: 0.28em;
      background: linear-gradient(125deg, #c084fc 0%, #818cf8 40%, #38bdf8 80%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(192, 132, 252, 0.42));
    }

    .hero-tagline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(13px, 2vw, 22px);
      font-style: italic;
      font-weight: 500;
      color: rgba(255,255,255,0.48);
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    .hero-tagline span {
      display: inline-block;
      margin-right: 0.5em;
    }
    .hero-tagline span::after {
      content: ' ·';
      color: rgba(255,255,255,0.22);
    }
    .hero-tagline span:last-child::after {
      content: '';
    }

    /* ── NAV BAR ── */
    #nav-bar {
      position: absolute;
      bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
      left: 0;
      right: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    @media (min-width: 640px) {
      #nav-bar {
        right: 3rem;
        left: auto;
        justify-content: flex-end;
        bottom: 3.5rem;
      }
    }

    .nav-btn { width:3.8rem;height:3.8rem;border-radius:50%;background:transparent;border:2px solid white;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 150ms ease,background-color 150ms ease;flex-shrink:0;-webkit-tap-highlight-color:transparent; }
    @media (min-width:640px) { .nav-btn { width:5.5rem;height:5.5rem;border-width:2.5px; } }
    .nav-btn:hover { transform:scale(1.08);background-color:rgba(255,255,255,0.12); }
    .nav-btn:active { transform:scale(0.94); }
    .nav-btn svg { width:24px;height:24px;stroke:white;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round; }
    @media (min-width:640px) { .nav-btn svg { width:36px;height:36px; } }

    /* dot-slider: only on mobile */
    #dot-slider { display:flex;align-items:center;gap:6px; }
    @media (min-width:640px) { #dot-slider { display:none; } }
    .dot { height:7px;width:7px;border-radius:50%;background:rgba(255,255,255,0.38);transition:background 300ms,width 300ms ease,border-radius 300ms;cursor:pointer;flex-shrink:0; }
    .dot.active { width:24px;border-radius:3.5px;background:white; }
  </style>
</head>
<body>

<div id="global-bg"></div>
<div id="grain"></div>

<div id="app">
  <div id="brand"><span class="brand-coders">Coders</span><span class="brand-verse">Verse</span></div>
  <a id="contact-btn" href="#get-in-touch">Contact</a>

  <!-- Hero text — visible on both mobile & desktop -->
  <div id="hero-text">
    <div>
      <p class="hero-we-make">We Make <span class="hero-best">Best</span></p>
      <h1 class="hero-websites">Websites</h1>
      <p class="hero-tagline">
        <span>Premium Website</span>
        <span>Lowest Prices</span>
        <span>Fast Delivery</span>
      </p>
    </div>
  </div>

  <div id="nav-bar">
    <button class="nav-btn" id="btn-prev" aria-label="Previous"><svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></button>
    <div id="dot-slider">
      <div class="dot active" data-i="0"></div><div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div><div class="dot" data-i="3"></div>
    </div>
    <button class="nav-btn" id="btn-next" aria-label="Next"><svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></button>
  </div>
</div>

<script>
/* ── GRAIN ── */
var grainSVG="<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.08'/></svg>";
document.getElementById('grain').style.backgroundImage='url("data:image/svg+xml,'+encodeURIComponent(grainSVG)+'")';
</script>
</body>
</html>
